name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ubuntu:
    name: Ubuntu / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Check Python syntax
        run: python -m compileall -q .

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tests < <(
            find . \
              -path './venv' -prune -o \
              -path './.venv' -prune -o \
              -path './.git' -prune -o \
              -type f \( \
                -path '*/tests/test_*.py' -o \
                -path '*/tests/*_test.py' -o \
                -name 'test_*.py' -o \
                -name '*_test.py' \
              \) -print
          )

          if [ "${#tests[@]}" -eq 0 ]; then
            echo "No pytest tests found yet; syntax check completed."
            exit 0
          fi

          python -m pytest -q
